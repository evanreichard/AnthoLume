openapi: 3.0.3
info:
  title: AnthoLume API v1
  version: 1.0.0
  description: REST API for AnthoLume document management system

servers:
  - url: /api/v1

components:
  schemas:
    Document:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        author:
          type: string
        description:
          type: string
        isbn10:
          type: string
        isbn13:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted:
          type: boolean
        words:
          type: integer
          format: int64
        filepath:
          type: string
        percentage:
          type: number
          format: float
        total_time_seconds:
          type: integer
          format: int64
        wpm:
          type: number
          format: float
        seconds_per_percent:
          type: integer
          format: int64
        last_read:
          type: string
          format: date-time
      required:
        - id
        - title
        - author
        - created_at
        - updated_at
        - deleted

    UserData:
      type: object
      properties:
        username:
          type: string
        is_admin:
          type: boolean
      required:
        - username
        - is_admin

    WordCount:
      type: object
      properties:
        document_id:
          type: string
        count:
          type: integer
          format: int64
      required:
        - document_id
        - count

    Progress:
      type: object
      properties:
        title:
          type: string
        author:
          type: string
        device_name:
          type: string
        device_id:
          type: string
        percentage:
          type: number
          format: double
        progress:
          type: string
        document_id:
          type: string
        user_id:
          type: string
        created_at:
          type: string
          format: date-time

    UpdateProgressRequest:
      type: object
      properties:
        document_id:
          type: string
        percentage:
          type: number
          format: double
        progress:
          type: string
        device_id:
          type: string
        device_name:
          type: string
      required:
        - document_id
        - percentage
        - progress
        - device_id
        - device_name

    UpdateProgressResponse:
      type: object
      properties:
        document_id:
          type: string
        timestamp:
          type: string
          format: date-time
      required:
        - document_id
        - timestamp

    CreateActivityItem:
      type: object
      properties:
        document_id:
          type: string
        start_time:
          type: integer
          format: int64
        duration:
          type: integer
          format: int64
        page:
          type: integer
          format: int64
        pages:
          type: integer
          format: int64
      required:
        - document_id
        - start_time
        - duration
        - page
        - pages

    CreateActivityRequest:
      type: object
      properties:
        device_id:
          type: string
        device_name:
          type: string
        activity:
          type: array
          items:
            $ref: '#/components/schemas/CreateActivityItem'
      required:
        - device_id
        - device_name
        - activity

    CreateActivityResponse:
      type: object
      properties:
        added:
          type: integer
          format: int64
      required:
        - added

    Activity:
      type: object
      properties:
        document_id:
          type: string
        device_id:
          type: string
        start_time:
          type: string
        title:
          type: string
        author:
          type: string
        duration:
          type: integer
          format: int64
        start_percentage:
          type: number
          format: float
        end_percentage:
          type: number
          format: float
        read_percentage:
          type: number
          format: float
      required:
        - document_id
        - device_id
        - start_time
        - duration
        - start_percentage
        - end_percentage
        - read_percentage

    SearchItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        author:
          type: string
        language:
          type: string
        series:
          type: string
        file_type:
          type: string
        file_size:
          type: string
        upload_date:
          type: string

    SearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchItem'
        source:
          type: string
        query:
          type: string
      required:
        - results
        - source
        - query

    Setting:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        key:
          type: string
        value:
          type: string
      required:
        - id
        - user_id
        - key
        - value

    DocumentsResponse:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: '#/components/schemas/Document'
        total:
          type: integer
          format: int64
        page:
          type: integer
          format: int64
        limit:
          type: integer
          format: int64
        next_page:
          type: integer
          format: int64
        previous_page:
          type: integer
          format: int64
        search:
          type: string
      required:
        - documents
        - total
        - page
        - limit

    DocumentResponse:
      type: object
      properties:
        document:
          $ref: '#/components/schemas/Document'
      required:
        - document

    ProgressListResponse:
      type: object
      properties:
        progress:
          type: array
          items:
            $ref: '#/components/schemas/Progress'
        page:
          type: integer
          format: int64
        limit:
          type: integer
          format: int64
        next_page:
          type: integer
          format: int64
        previous_page:
          type: integer
          format: int64
        total:
          type: integer
          format: int64

    ProgressResponse:
      type: object
      properties:
        progress:
          $ref: '#/components/schemas/Progress'

    ActivityResponse:
      type: object
      properties:
        activities:
          type: array
          items:
            $ref: '#/components/schemas/Activity'
      required:
        - activities

    Device:
      type: object
      properties:
        id:
          type: string
        device_name:
          type: string
        created_at:
          type: string
          format: date-time
        last_synced:
          type: string
          format: date-time

    SettingsResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserData'
        timezone:
          type: string
        devices:
          type: array
          items:
            $ref: '#/components/schemas/Device'
      required:
        - settings
        - user

    UpdateSettingsRequest:
      type: object
      properties:
        password:
          type: string
        new_password:
          type: string
        timezone:
          type: string

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        username:
          type: string
        is_admin:
          type: boolean
      required:
        - username
        - is_admin

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
      required:
        - code
        - message

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    DatabaseInfo:
      type: object
      properties:
        documents_size:
          type: integer
          format: int64
        activity_size:
          type: integer
          format: int64
        progress_size:
          type: integer
          format: int64
        devices_size:
          type: integer
          format: int64
      required:
        - documents_size
        - activity_size
        - progress_size
        - devices_size

    UserStreak:
      type: object
      properties:
        window:
          type: string
        max_streak:
          type: integer
          format: int64
        max_streak_start_date:
          type: string
        max_streak_end_date:
          type: string
        current_streak:
          type: integer
          format: int64
        current_streak_start_date:
          type: string
        current_streak_end_date:
          type: string
      required:
        - window
        - max_streak
        - max_streak_start_date
        - max_streak_end_date
        - current_streak
        - current_streak_start_date
        - current_streak_end_date

    StreaksResponse:
      type: object
      properties:
        streaks:
          type: array
          items:
            $ref: '#/components/schemas/UserStreak'
      required:
        - streaks

    GraphDataPoint:
      type: object
      properties:
        date:
          type: string
        minutes_read:
          type: integer
          format: int64
      required:
        - date
        - minutes_read

    GraphDataResponse:
      type: object
      properties:
        graph_data:
          type: array
          items:
            $ref: '#/components/schemas/GraphDataPoint'
      required:
        - graph_data

    LeaderboardEntry:
      type: object
      properties:
        user_id:
          type: string
        value:
          type: number
          format: double
      required:
        - user_id
        - value

    LeaderboardData:
      type: object
      properties:
        all:
          type: array
          items:
            $ref: '#/components/schemas/LeaderboardEntry'
        year:
          type: array
          items:
            $ref: '#/components/schemas/LeaderboardEntry'
        month:
          type: array
          items:
            $ref: '#/components/schemas/LeaderboardEntry'
        week:
          type: array
          items:
            $ref: '#/components/schemas/LeaderboardEntry'
      required:
        - all
        - year
        - month
        - week

    UserStatisticsResponse:
      type: object
      properties:
        wpm:
          $ref: '#/components/schemas/LeaderboardData'
        duration:
          $ref: '#/components/schemas/LeaderboardData'
        words:
          $ref: '#/components/schemas/LeaderboardData'
      required:
        - wpm
        - duration
        - words

    HomeResponse:
      type: object
      properties:
        database_info:
          $ref: '#/components/schemas/DatabaseInfo'
        streaks:
          $ref: '#/components/schemas/StreaksResponse'
        graph_data:
          $ref: '#/components/schemas/GraphDataResponse'
        user_statistics:
          $ref: '#/components/schemas/UserStatisticsResponse'
      required:
        - database_info
        - streaks
        - graph_data
        - user_statistics

    BackupType:
      type: string
      enum: [COVERS, DOCUMENTS]

    ImportType:
      type: string
      enum: [DIRECT, COPY]

    OperationType:
      type: string
      enum: [CREATE, UPDATE, DELETE]

    User:
      type: object
      properties:
        id:
          type: string
        admin:
          type: boolean
        created_at:
          type: string
          format: date-time
      required:
        - id
        - admin
        - created_at

    UsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'

    ImportResult:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        path:
          type: string
        status:
          type: string
          enum: [FAILED, SUCCESS, EXISTS]
        error:
          type: string

    ImportResultsResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/ImportResult'

    DirectoryItem:
      type: object
      properties:
        name:
          type: string
        path:
          type: string

    DirectoryListResponse:
      type: object
      properties:
        current_path:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/DirectoryItem'

    LogEntry:
      type: string

    LogsResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: '#/components/schemas/LogEntry'
        filter:
          type: string
        page:
          type: integer
          format: int64
        limit:
          type: integer
          format: int64
        next_page:
          type: integer
          format: int64
        previous_page:
          type: integer
          format: int64
        total:
          type: integer
          format: int64

    InfoResponse:
      type: object
      properties:
        version:
          type: string
        search_enabled:
          type: boolean
        registration_enabled:
          type: boolean
      required:
        - version
        - search_enabled
        - registration_enabled

  securitySchemes:
    BearerAuth:
      type: apiKey
      in: cookie
      name: token

paths:
  /documents:
    get:
      summary: List documents
      operationId: getDocuments
      tags:
        - Documents
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            format: int64
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            format: int64
            default: 9
        - name: search
          in: query
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentsResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Upload a new document
      operationId: createDocument
      tags:
        - Documents
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document_file:
                  type: string
                  format: binary
              required:
                - document_file
      security:
        - BearerAuth: []
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/{id}:
    get:
      summary: Get a single document
      operationId: getDocument
      tags:
        - Documents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Update document editable fields
      operationId: editDocument
      tags:
        - Documents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                author:
                  type: string
                description:
                  type: string
                isbn10:
                  type: string
                isbn13:
                  type: string
                cover_gbid:
                  type: string
      security:
        - BearerAuth: []
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/{id}/cover:
    get:
      summary: Get document cover image
      operationId: getDocumentCover
      tags:
        - Documents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        200:
          description: Cover image
          content:
            image/jpeg: {}
            image/png: {}
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Upload document cover image
      operationId: uploadDocumentCover
      tags:
        - Documents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                cover_file:
                  type: string
                  format: binary
              required:
                - cover_file
      security:
        - BearerAuth: []
      responses:
        200:
          description: Cover uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/{id}/file:
    get:
      summary: Download document file
      operationId: getDocumentFile
      tags:
        - Documents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        200:
          description: Document file download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /progress:
    get:
      summary: List progress records
      operationId: getProgressList
      tags:
        - Progress
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            format: int64
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            format: int64
            default: 15
        - name: document
          in: query
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressListResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update document progress
      operationId: updateProgress
      tags:
        - Progress
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProgressRequest'
      responses:
        200:
          description: Progress updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateProgressResponse'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /progress/{id}:
    get:
      summary: Get document progress
      operationId: getProgress
      tags:
        - Progress
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Progress not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /activity:
    get:
      summary: Get activity data
      operationId: getActivity
      tags:
        - Activity
      parameters:
        - name: doc_filter
          in: query
          schema:
            type: boolean
            default: false
        - name: document_id
          in: query
          schema:
            type: string
        - name: offset
          in: query
          schema:
            type: integer
            format: int64
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            format: int64
            default: 100
      security:
        - BearerAuth: []
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create activity records
      operationId: createActivity
      tags:
        - Activity
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActivityRequest'
      responses:
        200:
          description: Activity created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateActivityResponse'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /settings:
    get:
      summary: Get user settings
      operationId: getSettings
      tags:
        - Settings
      security:
        - BearerAuth: []
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update user settings
      operationId: updateSettings
      tags:
        - Settings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
